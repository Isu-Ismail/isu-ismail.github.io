            return s.replace(/~and~/g, '&')

          })[0];
          if (decoded) {
            var path = decoded.slice(2);
            var q = l.search.slice(1).split('&').filter(function(s) {
              return s.slice(0, 2) !== 'p='
            }).join('&');

            window.history.replaceState(null, null,
              l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
              l.pathname + path + q + l.hash
            );
          }
        }
      }(window.location));
